<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feedback admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; font-size: 14px; color: #111; background: #fafafa; padding: 2rem; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: .25rem; }
  .sub { color: #777; font-size: 13px; margin-bottom: 1.5rem; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; }
  input[type=url], input[type=password] { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
  input[type=url] { flex: 2; }
  input[type=password] { flex: 1; }
  button { padding: 6px 14px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; }
  button:hover { background: #f0f0f0; }
  button:disabled { opacity: .5; cursor: default; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; border: 1px solid #e5e5e5; }
  th { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: .04em; padding: 10px 12px; text-align: left; border-bottom: 1px solid #e5e5e5; background: #f9f9f9; }
  td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: top; word-break: break-word; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }
  a.issue { font-size: 13px; color: #1a6fb3; text-decoration: none; white-space: nowrap; }
  a.issue:hover { text-decoration: underline; }
  .muted { color: #888; }
  .mono { font-variant-numeric: tabular-nums; }
  .msg { padding: 1rem; color: #888; font-size: 13px; }
  .err { color: #c0392b; background: #fdf0f0; border: 1px solid #f5c6c6; border-radius: 6px; padding: .75rem 1rem; margin-bottom: 1rem; font-size: 13px; }
  .count { font-size: 12px; color: #aaa; margin-top: .5rem; }
</style>
</head>
<body>

<h1>Feedback</h1>
<p class="sub">nwbort/accc-mergers</p>

<div class="toolbar">
  <input type="url" id="url" placeholder="https://feedback-admin.your-subdomain.workers.dev" />
  <input type="password" id="secret" placeholder="Secret" />
  <button id="btn-load" onclick="load()">Fetch</button>
</div>

<div id="err" class="err" style="display:none"></div>
<div id="content"></div>

<script>
const REPO = 'nwbort/accc-mergers';
const MAX = 80;

const $ = id => document.getElementById(id);

const savedUrl = localStorage.getItem('fb_worker_url');
const savedSecret = localStorage.getItem('fb_secret');
if (savedUrl) $('url').value = savedUrl;
if (savedSecret) $('secret').value = savedSecret;

function truncate(s) { return s.length <= MAX ? s : s.slice(0, MAX - 1) + '…'; }

function fmt(raw) {
  const d = new Date(raw.replace(' ', 'T') + (raw.includes('Z') ? '' : 'Z'));
  return d.toLocaleString('en-AU', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
}

function issueUrl(row) {
  const title = truncate(row.message);
  const body = ['**From:** ' + row.email, '**Submitted:** ' + row.created_at, '**Feedback ID:** ' + row.id, '', '---', '', row.message].join('\n');
  return 'https://github.com/' + REPO + '/issues/new?' + new URLSearchParams({ title, body, labels: 'feedback' });
}

async function load() {
  const base = $('url').value.trim().replace(/\/$/, '');
  const secret = $('secret').value.trim();
  if (!base || !secret) return;
  localStorage.setItem('fb_worker_url', base);
  localStorage.setItem('fb_secret', secret);

  $('btn-load').disabled = true;
  $('btn-load').textContent = 'Loading…';
  $('err').style.display = 'none';
  $('content').innerHTML = '';

  try {
    const res = await fetch(base + '/feedback', {
      headers: { 'x-secret': secret }
    });
    if (res.status === 403) throw new Error('Forbidden — check your secret');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();

    if (!rows.length) {
      $('content').innerHTML = '<p class="msg">No feedback yet.</p>';
      return;
    }

    $('content').innerHTML = `
      <table>
        <thead><tr>
          <th style="width:36px">#</th>
          <th>Message</th>
          <th style="width:180px">Email</th>
          <th style="width:150px">Submitted</th>
          <th style="width:90px;text-align:right">Issue</th>
        </tr></thead>
        <tbody>${rows.map(r => `
          <tr>
            <td class="muted mono">${r.id}</td>
            <td>${r.message}</td>
            <td class="muted">${r.email}</td>
            <td class="muted mono">${fmt(r.created_at)}</td>
            <td style="text-align:right"><a class="issue" href="${issueUrl(r)}" target="_blank">New issue ↗</a></td>
          </tr>`).join('')}
        </tbody>
      </table>
      <p class="count">${rows.length} ${rows.length === 1 ? 'entry' : 'entries'}</p>`;
  } catch (e) {
    $('err').textContent = 'Error: ' + e.message;
    $('err').style.display = '';
  } finally {
    $('btn-load').disabled = false;
    $('btn-load').textContent = 'Fetch';
  }
}

if (savedUrl && savedSecret) load();
</script>
</body>
</html>
