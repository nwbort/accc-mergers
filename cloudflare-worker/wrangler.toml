name = "mergers-digest-signup"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Route this worker through your mergers.fyi domain.
# After deploying, add a Custom Domain in the Cloudflare dashboard
# (Workers & Pages → your worker → Settings → Domains & Routes)
# e.g. digest-signup.mergers.fyi  OR  a route like mergers.fyi/api/subscribe*
#
# Example route (uncomment and fill in your zone ID):
# [[routes]]
# pattern = "mergers.fyi/api/subscribe"
# zone_name = "mergers.fyi"

# Secrets — set these with:
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put RESEND_AUDIENCE_ID
#   wrangler secret put TURNSTILE_SECRET_KEY
#
# Do NOT put real values here; wrangler.toml is committed to the repo.

# D1 database for feedback storage.
# Setup:
#   1. wrangler d1 create mergers-feedback
#   2. Copy the database_id from the output and paste it below
#   3. wrangler d1 execute mergers-feedback --file=schema.sql
#   4. wrangler deploy
#
# To read feedback: Cloudflare Dashboard → D1 → mergers-feedback → Console
#   SELECT * FROM feedback ORDER BY created_at DESC;
[[d1_databases]]
binding = "DB"
database_name = "mergers-feedback"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[vars]
ENVIRONMENT = "production"

# Local development overrides (used by `wrangler dev`)
[env.dev]
name = "mergers-digest-signup-dev"
[env.dev.vars]
ENVIRONMENT = "development"
