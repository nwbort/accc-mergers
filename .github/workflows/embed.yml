name: Generate semantic embeddings

# Stage 1 of mergers.fyi semantic search: regenerate data/embeddings.json
# whenever the canonical processed merger data changes, and commit the result
# back to the repo so the website / future search code can pick it up as a
# static asset.

on:
  push:
    branches:
      - main
    paths:
      - 'data/processed/mergers.json'
      - 'scripts/embed.py'
      - 'scripts/requirements-embed.txt'
      - '.github/workflows/embed.yml'
  workflow_dispatch:

permissions:
  contents: write

# Avoid stomping on a still-running pipeline commit by serialising runs.
concurrency:
  group: embed-${{ github.ref }}
  cancel-in-progress: false

jobs:
  embed:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements-embed.txt

      # Cache the Hugging Face model download so repeat runs skip the
      # ~1.2GB fetch. Keyed on the model name so swapping MODEL_NAME in
      # embed.py invalidates the cache automatically.
      - name: Resolve model name
        id: model
        run: |
          name=$(python -c "import sys; sys.path.insert(0, 'scripts'); from embed import MODEL_NAME; print(MODEL_NAME)")
          # Sanitise '/' so the value is safe to use in a cache key.
          safe=${name//\//__}
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "safe=$safe" >> "$GITHUB_OUTPUT"
          echo "Using model: $name"

      - name: Cache Hugging Face model
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ steps.model.outputs.safe }}

      - name: Generate embeddings
        # EmbeddingGemma is a gated model on Hugging Face. Accept the licence
        # at https://huggingface.co/google/embeddinggemma-300m once, then add
        # a read-only HF access token as the repo secret HF_TOKEN.
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/embed.py

      - name: Commit and push embeddings
        run: |-
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/embeddings.json data/embeddings.bin
          if git diff --staged --quiet; then
            echo "No embedding changes to commit"
            exit 0
          fi
          git commit -m "Update semantic embeddings"
          git pull --rebase || { git rebase --abort; exit 1; }
          git push
