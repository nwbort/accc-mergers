name: Merger Pipeline

on:
  repository_dispatch:
    types: [new_merger_detected]
  workflow_dispatch:
    inputs:
      all_mergers:
        description: 'Process all mergers (not just new/changed ones)'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
  schedule:
    - cron: '8 * * * *'

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.22'
          cache: false

      - name: Cache pup binary
        id: cache-pup
        uses: actions/cache@v5
        with:
          path: ~/go/bin/pup
          key: ${{ runner.os }}-pup-v0.4.0

      - name: Install pup HTML parser
        if: steps.cache-pup.outputs.cache-hit != 'true'
        run: go install github.com/ericchiang/pup@latest

      - name: Add Go bin to PATH
        run: echo "${HOME}/go/bin" >> $GITHUB_PATH

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      # --- Scrape ---

      - name: Run scraper
        run: |
          chmod +x ./scripts/scrape.sh
          if [ "${{ inputs.all_mergers }}" = "true" ]; then
            ./scripts/scrape.sh --all
          else
            ./scripts/scrape.sh
          fi

      - name: Verify HTML cleaning
        run: |
          # Report any matter HTML files modified by this scrape run that still
          # contain known uncleaned dynamic tokens. This catches cases where
          # clean_file did not run, or where a git rebase will later undo its
          # substitutions when two concurrent runs touched the same file.
          modified_html=()
          while IFS= read -r f; do
            modified_html+=("$f")
          done < <(git status --porcelain data/raw/matters/ 2>/dev/null \
                    | awk '{print $NF}' | grep '\.html$' || true)

          if [ ${#modified_html[@]} -eq 0 ]; then
            echo "No matter HTML files were modified by this scrape run."
          else
            echo "Checking ${#modified_html[@]} modified matter page(s) for uncleaned tokens..."
            bad_files=()
            for f in "${modified_html[@]}"; do
              if grep -qE \
                'js-view-dom-id-[a-f0-9]{64}|/(css|js)/[a-zA-Z]+_[A-Za-z0-9_-]{30,}\.(css|js)(\?|")' \
                "$f" 2>/dev/null; then
                bad_files+=("$f")
              fi
            done
            if [ ${#bad_files[@]} -gt 0 ]; then
              echo "WARNING: The following matter pages appear to have uncleaned dynamic content:"
              printf '  %s\n' "${bad_files[@]}"
              echo "This may indicate clean_file did not run, or a concurrent pipeline run"
              echo "touching the same file will cause a rebase to reintroduce raw tokens."
            else
              echo "HTML cleaning check passed (${#modified_html[@]} file(s) verified)."
            fi
          fi

      - name: Check for scrape changes
        id: scrape-changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            # acquisitions-register.html alone isn't worth committing: any meaningful
            # change (new merger, status update) is also reflected in individual matter
            # pages. Unstage it if it's the only thing that changed.
            non_register=$(git diff --staged --name-only | grep -v "^data/raw/acquisitions-register\.html$" | wc -l)
            if [ "$non_register" -gt 0 ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              git restore --staged data/raw/acquisitions-register.html
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          fi

      # --- Extract (first pass) ---
      # Always runs on non-scheduled triggers; on schedule only if scrape found changes.

      - name: Run extraction
        if: steps.scrape-changes.outputs.changed == 'true' || github.event_name != 'schedule'
        run: |
          if [ "${{ inputs.all_mergers }}" = "true" ]; then
            python scripts/extract_mergers.py --all
          else
            python scripts/extract_mergers.py
          fi
          python scripts/generate_static_data.py
          ./scripts/generate-cli-data.sh
          python scripts/generate_rss_feed.py

      - name: Stage extracted data
        if: steps.scrape-changes.outputs.changed == 'true' || github.event_name != 'schedule'
        run: |
          git add data/processed/mergers.json data/processed/questionnaire_data.json \
            data/raw/matters/ merger-tracker/frontend/public/data/ \
            merger-tracker/frontend/public/feed.xml data/output/

      # --- Convert DOCX to PDF ---
      # Runs whenever there are unconverted files, catching both new downloads and stragglers.

      - name: Find unconverted DOCX files
        id: find-docx
        run: |
          > /tmp/unconverted.txt
          while IFS= read -r -d '' docx; do
            pdf="${docx%.docx}.pdf"
            if [ ! -f "$pdf" ]; then
              echo "$docx" >> /tmp/unconverted.txt
            fi
          done < <(find data/raw/matters -name "*.docx" -type f -print0 2>/dev/null)

          if [ -s /tmp/unconverted.txt ]; then
            echo "Found unconverted DOCX files:"
            cat /tmp/unconverted.txt
            echo "has_unconverted=true" >> $GITHUB_OUTPUT
          else
            echo "No unconverted DOCX files found"
            echo "has_unconverted=false" >> $GITHUB_OUTPUT
          fi

      - name: Install LibreOffice
        if: steps.find-docx.outputs.has_unconverted == 'true'
        run: sudo apt-get update && sudo apt-get install -y libreoffice-writer --no-install-recommends

      - name: Convert DOCX to PDF
        if: steps.find-docx.outputs.has_unconverted == 'true'
        run: |
          while IFS= read -r docx; do
            if [ -n "$docx" ]; then
              echo "Converting: $docx"
              dir=$(dirname "$docx")
              libreoffice --headless --convert-to pdf --outdir "$dir" "$docx"
            fi
          done < /tmp/unconverted.txt

      - name: Stage converted PDFs
        if: steps.find-docx.outputs.has_unconverted == 'true'
        run: git add "data/raw/matters/**/*.pdf"

      # --- Extract (second pass) ---
      # Picks up questionnaire data from newly converted PDFs.

      - name: Re-run extraction to pick up converted PDFs
        if: steps.find-docx.outputs.has_unconverted == 'true'
        run: |
          if [ "${{ inputs.all_mergers }}" = "true" ]; then
            python scripts/extract_mergers.py --all
          else
            python scripts/extract_mergers.py
          fi
          python scripts/generate_static_data.py
          ./scripts/generate-cli-data.sh
          python scripts/generate_rss_feed.py

      - name: Stage re-extracted data
        if: steps.find-docx.outputs.has_unconverted == 'true'
        run: |
          git add data/processed/mergers.json data/processed/questionnaire_data.json \
            data/raw/matters/ merger-tracker/frontend/public/data/ \
            merger-tracker/frontend/public/feed.xml data/output/

      # --- Single commit ---

      - name: Commit all changes
        run: |
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          timestamp=$(date -u)
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update merger data: ${timestamp}"
            git pull --rebase || { git rebase --abort; exit 1; }

            # After rebase, re-clean any HTML files that changed. A 3-way merge
            # during rebase can reintroduce raw dynamic tokens if both the local
            # commit and the pulled commits touched the same file.
            rebase_html=$(git diff HEAD^..HEAD --name-only 2>/dev/null | grep '\.html$' || true)
            if [ -n "$rebase_html" ]; then
              echo "HTML files in rebased commit:"
              echo "$rebase_html" | sed 's/^/  /'
              while IFS= read -r f; do
                if [ -f "$f" ]; then
                  ./scripts/scrape.sh --clean-file "$f"
                  git add "$f"
                  echo "Re-cleaned: $f"
                fi
              done <<< "$rebase_html"
              if ! git diff --staged --quiet; then
                echo "WARNING: Rebase introduced uncleaned HTML — amending commit to fix"
                git commit --amend --no-edit
              fi
            fi

            git push
          fi
