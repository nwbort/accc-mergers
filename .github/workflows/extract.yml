name: Extract and Commit Merger Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run extraction script (download phase)
        run: python scripts/extract_mergers.py --skip-pdf-enrich

      # Install Tesseract only if a pending Phase 2 Notice actually needs the
      # OCR fallback in parse_phase2_notice.py (most have a full text layer
      # and never touch it) — and never for a matter that's already been
      # parsed, e.g. Ampol-EG Australia.
      - name: Check if Phase 2 Notice OCR is needed
        id: check-ocr
        run: |
          needs_ocr=$(python scripts/check_phase2_notice_ocr_needed.py)
          echo "needs_ocr=$needs_ocr" >> "$GITHUB_OUTPUT"

      - name: Install Tesseract OCR
        if: steps.check-ocr.outputs.needs_ocr == 'true'
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr --no-install-recommends

      - name: Run extraction script (enrich phase)
        run: python scripts/enrich_pdfs.py

      - name: Generate similar mergers (incremental)
        run: python scripts/generate_similar_mergers.py

      - name: Generate static data files
        run: python scripts/generate_static_data.py

      - name: Generate CLI data bundle
        run: ./scripts/generate-cli-data.sh

      - name: Generate RSS feed
        run: python scripts/generate_rss_feed.py

      - name: Commit and push changes
        run: |-
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/mergers.json data/processed/questionnaire_data.json \
            data/processed/similar_mergers.json \
            data/raw/matters/ merger-tracker/frontend/public/data/ \
            merger-tracker/frontend/public/feed.xml data/output/
          timestamp=$(TZ='Australia/Sydney' date)
          git diff --staged --quiet || true
          git commit -m "Update scraped data and static files: ${timestamp}" || exit 0
          git pull --rebase || { git rebase --abort; exit 1; }
          git push
