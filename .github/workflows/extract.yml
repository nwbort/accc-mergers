name: Extract and Commit Merger Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run extraction script
        run: python scripts/extract_mergers.py

      - name: Generate static data files
        run: python scripts/generate_static_data.py

      - name: Generate CLI data bundle
        run: ./scripts/generate-cli-data.sh

      - name: Generate RSS feed
        run: python scripts/generate_rss_feed.py

      - name: Commit and push changes
        run: |-
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/mergers.json data/processed/questionnaire_data.json \
            data/raw/matters/ merger-tracker/frontend/public/data/ \
            merger-tracker/frontend/public/feed.xml data/output/
          timestamp=$(date -u)
          git diff --staged --quiet || true
          git commit -m "Update scraped data and static files: ${timestamp}" || exit 0
          git pull --rebase || { git rebase --abort; exit 1; }
          git push
