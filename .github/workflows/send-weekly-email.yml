name: Send Weekly Digest Email

on:
  workflow_run:
    workflows: ["Generate Weekly Digest"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build HTML, skip sending)'
        required: false
        default: 'false'
        type: boolean

jobs:
  send-email:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Shallow clone is enough — we only need digest.json
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Send weekly digest email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python scripts/send_weekly_email.py
