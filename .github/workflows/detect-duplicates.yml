name: Detect Duplicate Events

on:
  schedule:
    # Daily at 2 AM UTC (noon AEST / 1 PM AEDT), after the hourly scrape
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run duplicate detection
        id: detect
        run: |
          if python3 scripts/detect_duplicates.py --output duplicate_report.json; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Write job summary
        run: |
          python3 scripts/detect_duplicates.py >> "$GITHUB_STEP_SUMMARY" || true

      - name: Ensure label exists
        if: steps.detect.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "duplicate-events" \
            --description "Duplicate events detected in merger data" \
            --color "e4e669" \
            --force

      - name: Create or update issue
        if: steps.detect.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          REPORT=$(python3 scripts/detect_duplicates.py || true)

          BODY="Duplicate events were detected on **${DATE}**. Please inspect the entries below and manually edit \`data/processed/mergers.json\` as needed.

          \`\`\`
          ${REPORT}
          \`\`\`"

          EXISTING=$(gh issue list \
            --label "duplicate-events" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" \
              --title "Duplicate merger events detected - ${DATE}" \
              --body "$BODY"
            echo "Updated existing issue #${EXISTING}"
          else
            gh issue create \
              --title "Duplicate merger events detected - ${DATE}" \
              --body "$BODY" \
              --label "duplicate-events"
            echo "Created new issue"
          fi

      - name: Close issue if no duplicates remain
        if: steps.detect.outputs.found == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh issue list \
            --label "duplicate-events" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" \
              --comment "All duplicate events resolved as of $(date -u +%Y-%m-%d). Closing automatically."
            echo "Closed issue #${EXISTING}"
          else
            echo "No open duplicate-events issue to close"
          fi
